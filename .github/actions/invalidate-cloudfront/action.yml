name: Invalidate CloudFront
description: Placeholder for CloudFront cache invalidation (not implemented).

inputs:
  distribution-id:
    description: CloudFront distribution ID
    required: true
  paths:
    description: Space-separated paths to invalidate (e.g. /* or /index.html)
    required: false
    default: /*

outputs:
  invalidated:
    description: Whether the placeholder invalidation step completed
    value: ${{ steps.placeholder.outputs.invalidated }}

runs:
  using: composite
  steps:
    - name: Placeholder — CloudFront invalidation not implemented
      id: placeholder
      shell: bash
      run: |
        echo "::notice::TODO: invalidate CloudFront distribution ${{ inputs.distribution-id }}"
        echo "paths=${{ inputs.paths }}"
        echo "invalidated=true" >> "$GITHUB_OUTPUT"
