name: Deploy Lambda
description: Placeholder for updating Lambda function code (not implemented).

inputs:
  function-name:
    description: Target Lambda function name
    required: true
  artifact-path:
    description: Path to the deployment package (zip)
    required: false
    default: dist/lambda.zip
  publish:
    description: Publish a new Lambda version after update
    required: false
    default: 'false'

outputs:
  deployed:
    description: Whether the placeholder deploy step completed
    value: ${{ steps.placeholder.outputs.deployed }}

runs:
  using: composite
  steps:
    - name: Placeholder — Lambda update not implemented
      id: placeholder
      shell: bash
      run: |
        echo "::notice::TODO: update Lambda function ${{ inputs.function-name }}"
        echo "artifact-path=${{ inputs.artifact-path }}"
        echo "publish=${{ inputs.publish }}"
        echo "deployed=true" >> "$GITHUB_OUTPUT"
