name: Deploy Lambda
description: Upload a Lambda deployment package and optionally publish a new version.

inputs:
  function-name:
    description: Target Lambda function name
    required: true
  artifact-path:
    description: Path to the deployment package (zip)
    required: false
    default: dist/lambda.zip
  package-type:
    description: 'express = esbuild API bundle; ssr = TanStack Start zip (dist/client + dist/server)'
    required: false
    default: express
  publish:
    description: Publish a new Lambda version after update
    required: false
    default: 'false'
  health-probe-path:
    description: Optional API Gateway path for post-deploy smoke test (e.g. /mobile/health)
    required: false
    default: ''

outputs:
  deployed:
    description: Whether Lambda code was updated
    value: ${{ steps.deploy.outputs.deployed }}
  version:
    description: Published Lambda version (when publish=true)
    value: ${{ steps.deploy.outputs.version }}

runs:
  using: composite
  steps:
    - name: Validate artifact
      shell: bash
      run: |
        set -euo pipefail
        ZIP="${{ inputs.artifact-path }}"
        PKG="${{ inputs.package-type }}"
        if [ ! -f "$ZIP" ]; then
          echo "::error::Lambda artifact not found: $ZIP"
          exit 1
        fi
        ls -lh "$ZIP"

        listing="$(unzip -l "$ZIP")"
        echo "$listing"

        if echo "$listing" | grep -q 'node_modules/'; then
          echo "::error::Lambda zip contains node_modules/. Use esbuild packaging (scripts/package-lambda.mjs)."
          exit 1
        fi

        if [ "$PKG" = "ssr" ]; then
          if ! echo "$listing" | grep -Eq 'dist/runtimes/lambda\.(mjs|js)'; then
            echo "::error::SSR Lambda zip missing dist/runtimes/lambda.mjs (or .js)"
            exit 1
          fi
          if ! echo "$listing" | grep -q 'dist/client/'; then
            echo "::error::SSR Lambda zip missing dist/client/ static assets"
            exit 1
          fi
          if ! echo "$listing" | grep -q 'dist/server/'; then
            echo "::error::SSR Lambda zip missing dist/server/ SSR bundle"
            exit 1
          fi
          echo "SSR Lambda package validation passed"
          exit 0
        fi

        if ! echo "$listing" | grep -q 'dist/runtimes/lambda.js'; then
          echo "::error::Lambda zip missing bundled handler dist/runtimes/lambda.js"
          exit 1
        fi

        handler_bytes="$(unzip -p "$ZIP" dist/runtimes/lambda.js | wc -c | tr -d ' ')"
        if [ "$handler_bytes" -lt 500000 ]; then
          echo "::error::Bundled handler is only ${handler_bytes} bytes — expected esbuild bundle (~1–10 MB)."
          exit 1
        fi
        echo "Bundled handler size: $(( handler_bytes / 1024 / 1024 )) MB"

    - name: Update Lambda function code
      id: deploy
      shell: bash
      run: |
        set -euo pipefail
        FN="${{ inputs.function-name }}"
        ZIP="${{ inputs.artifact-path }}"

        aws lambda update-function-code \
          --function-name "$FN" \
          --zip-file "fileb://${ZIP}" \
          --output json > /tmp/lambda-update.json

        aws lambda wait function-updated --function-name "$FN"
        echo "Lambda code update completed for: $FN"

        echo "deployed=true" >> "$GITHUB_OUTPUT"

        if [ "${{ inputs.publish }}" = "true" ]; then
          VERSION=$(aws lambda publish-version --function-name "$FN" --query Version --output text)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Published Lambda version: $VERSION"
        fi

        echo "✔ Updated Lambda function: $FN"

    - name: Smoke test Lambda handler
      if: inputs.health-probe-path != ''
      shell: bash
      run: |
        set -euo pipefail
        FN="${{ inputs.function-name }}"
        PATH_PROBE="${{ inputs.health-probe-path }}"
        PAYLOAD=$(jq -nc \
          --arg path "$PATH_PROBE" \
          '{rawPath: $path, requestContext: {http: {method: "GET", path: $path}}}')

        aws lambda invoke \
          --function-name "$FN" \
          --payload "$PAYLOAD" \
          --cli-binary-format raw-in-base64-out \
          /tmp/lambda-smoke.json

        cat /tmp/lambda-smoke.json
        STATUS="$(jq -r '.statusCode // empty' /tmp/lambda-smoke.json)"
        if [ "$STATUS" != "200" ]; then
          echo "::error::Lambda smoke test failed for $PATH_PROBE (statusCode=$STATUS)"
          exit 1
        fi
        echo "✔ Lambda smoke test passed: $PATH_PROBE → 200"
