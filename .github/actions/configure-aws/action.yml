name: Configure AWS
description: Placeholder for OIDC-based AWS credential configuration (not implemented).

inputs:
  aws-region:
    description: AWS region for subsequent CLI commands
    required: false
    default: eu-west-1
  role-arn:
    description: IAM role ARN to assume via GitHub OIDC
    required: false
    default: ''
  role-session-name:
    description: Session name for the assumed role
    required: false
    default: novasafe-github-actions

outputs:
  configured:
    description: Whether the placeholder configuration step completed
    value: ${{ steps.placeholder.outputs.configured }}

runs:
  using: composite
  steps:
    - name: Placeholder — AWS OIDC configuration not implemented
      id: placeholder
      shell: bash
      run: |
        echo "::notice::TODO: configure AWS credentials via OIDC"
        echo "aws-region=${{ inputs.aws-region }}"
        echo "role-arn=${{ inputs.role-arn }}"
        echo "role-session-name=${{ inputs.role-session-name }}"
        echo "configured=true" >> "$GITHUB_OUTPUT"
