name: Configure AWS
description: Configure short-lived AWS credentials via GitHub OIDC (no access keys).

inputs:
  aws-region:
    description: AWS region for subsequent CLI commands
    required: true
  role-arn:
    description: IAM role ARN to assume via GitHub OIDC
    required: true
  role-session-name:
    description: Session name for the assumed role
    required: false
    default: novasafe-github-actions

outputs:
  configured:
    description: Whether AWS credentials were configured successfully
    value: ${{ steps.mark.outputs.configured }}

runs:
  using: composite
  steps:
    - name: Configure AWS credentials (OIDC)
      uses: aws-actions/configure-aws-credentials@v4
      with:
        role-to-assume: ${{ inputs.role-arn }}
        aws-region: ${{ inputs.aws-region }}
        role-session-name: ${{ inputs.role-session-name }}

    - name: Mark credentials configured
      id: mark
      shell: bash
      run: echo "configured=true" >> "$GITHUB_OUTPUT"
