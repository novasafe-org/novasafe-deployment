# Reusable workflow — build and package a NovaSafe backend for AWS Lambda.
#
# Bundles the same `.env` file format used on VPS into the deployment zip.
# Caller must provide ENV_FILE_CONTENT (full .env body) via GitHub Environment secret.
#
# Required Repository Variables: AWS_ROLE_ARN, AWS_REGION (for future SSM steps)

name: Build Backend (AWS)

on:
  workflow_call:
    inputs:
      service:
        description: Backend service directory (core | admin-app)
        required: true
        type: string
      application-name:
        description: Application label (e.g. novasafe-mobile-api)
        required: true
        type: string
      node-version:
        description: Node.js version for the build
        required: false
        type: string
        default: '22'
      env-secret-name:
        description: 'Environment secret suffix: MOBILE_API_ENV_FILE or ADMIN_API_ENV_FILE'
        required: false
        type: string
        default: MOBILE_API_ENV_FILE
      overrides-env-path:
        description: Path in novasafe-deployment repo to Lambda override env file
        required: true
        type: string
      github-environment:
        description: GitHub Environment for secrets
        required: false
        type: string
        default: production
    outputs:
      artifact-path:
        description: Path to the Lambda zip artifact
        value: ${{ jobs.build.outputs.artifact-path }}

jobs:
  build:
    name: Package ${{ inputs.application-name }} for Lambda
    runs-on: ubuntu-latest
    environment: ${{ inputs.github-environment }}
    outputs:
      artifact-path: ${{ steps.package.outputs.artifact-path }}
    steps:
      - name: Checkout backend
        uses: actions/checkout@v4

      - name: Checkout deployment scripts
        uses: actions/checkout@v4
        with:
          repository: novasafe-org/novasafe-deployment
          ref: master
          path: _novasafe-deployment
          sparse-checkout: |
            .github/scripts/merge-env-files.mjs
            infra-aws/config/env

      - name: Enable Corepack
        run: corepack enable

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node-version }}

      - name: Install pnpm dependencies
        env:
          HUSKY: '0'
        run: pnpm install --frozen-lockfile

      - name: Merge .env with Lambda overrides
        env:
          MOBILE_API_ENV_FILE: ${{ secrets.MOBILE_API_ENV_FILE }}
          ADMIN_API_ENV_FILE: ${{ secrets.ADMIN_API_ENV_FILE }}
        run: |
          set -euo pipefail
          case "${{ inputs.service }}" in
            core)
              ENV_CONTENT="${MOBILE_API_ENV_FILE:-}"
              SECRET_NAME="MOBILE_API_ENV_FILE"
              ;;
            admin-app)
              ENV_CONTENT="${ADMIN_API_ENV_FILE:-}"
              SECRET_NAME="ADMIN_API_ENV_FILE"
              ;;
            *)
              echo "::error::Unknown service: ${{ inputs.service }}"
              exit 1
              ;;
          esac

          if [ -z "${ENV_CONTENT}" ]; then
            echo "::error::GitHub Environment secret '${SECRET_NAME}' is empty or missing."
            echo "::error::Paste your VPS .env file contents into Settings → Environments → production → Secrets."
            exit 1
          fi

          printf '%s' "$ENV_CONTENT" > /tmp/service.env
          node _novasafe-deployment/.github/scripts/merge-env-files.mjs \
            /tmp/lambda.env \
            /tmp/service.env \
            _novasafe-deployment/${{ inputs.overrides-env-path }}

      - name: Package Lambda zip
        id: package
        run: |
          set -euo pipefail
          node scripts/package-lambda.mjs \
            --service ${{ inputs.service }} \
            --env-file /tmp/lambda.env \
            --output dist/lambda.zip
          echo "artifact-path=dist/lambda.zip" >> "$GITHUB_OUTPUT"

      - name: Upload Lambda artifact
        uses: actions/upload-artifact@v4
        with:
          name: lambda-${{ inputs.application-name }}-${{ github.run_id }}
          path: dist/lambda.zip
          retention-days: 7
