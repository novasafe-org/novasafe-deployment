# Reusable workflow — build and package a NovaSafe backend for AWS Lambda.
#
# Loads the same `.env` file used on the VPS (via SSH), merges Lambda overrides,
# and bundles it into the deployment zip. No per-variable GitHub secrets needed.

name: Build Backend (AWS)

on:
  workflow_call:
    inputs:
      service:
        description: Backend service directory (core | admin-app)
        required: true
        type: string
      application-name:
        description: Application label (e.g. novasafe-mobile-api)
        required: true
        type: string
      node-version:
        description: Node.js version for the build
        required: false
        type: string
        default: '22'
      vps-env-relative-path:
        description: Path to .env relative to DEPLOY_PATH on VPS (e.g. mobile-api/.env)
        required: true
        type: string
      overrides-env-path:
        description: Path in novasafe-deployment repo to Lambda override env file
        required: true
        type: string
    secrets:
      SSH_USER:
        required: true
      SSH_HOST:
        required: true
      DEPLOY_PATH:
        required: true
      SSH_PASSWORD:
        required: false
      SSH_PRIVATE_KEY:
        required: false
    outputs:
      artifact-path:
        description: Path to the Lambda zip artifact
        value: ${{ jobs.build.outputs.artifact-path }}

jobs:
  build:
    name: Package ${{ inputs.application-name }} for Lambda
    runs-on: ubuntu-latest
    outputs:
      artifact-path: ${{ steps.package.outputs.artifact-path }}
    steps:
      - name: Checkout backend
        uses: actions/checkout@v4

      - name: Checkout deployment scripts
        uses: actions/checkout@v4
        with:
          repository: novasafe-org/novasafe-deployment
          ref: master
          path: _novasafe-deployment
          sparse-checkout: |
            .github/scripts/merge-env-files.mjs
            .github/scripts/fetch-vps-env.sh
            infra-aws/config/env

      - name: Enable Corepack
        run: corepack enable

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node-version }}
          cache: pnpm

      - name: Verify pnpm workspace allows esbuild
        run: |
          set -euo pipefail
          if [ ! -f pnpm-workspace.yaml ]; then
            echo "::error::pnpm-workspace.yaml is required for pnpm v11 (allowBuilds)."
            exit 1
          fi
          if ! grep -q 'esbuild: true' pnpm-workspace.yaml; then
            echo "::error::pnpm-workspace.yaml must include: allowBuilds: esbuild: true"
            exit 1
          fi

      - name: Install pnpm dependencies
        env:
          HUSKY: '0'
          CI: 'true'
        run: pnpm install --frozen-lockfile

      - name: Fetch .env from VPS and merge Lambda overrides
        env:
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PASSWORD: ${{ secrets.SSH_PASSWORD }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        run: |
          set -euo pipefail
          bash _novasafe-deployment/.github/scripts/fetch-vps-env.sh \
            "${{ inputs.vps-env-relative-path }}" \
            /tmp/service.env
          node _novasafe-deployment/.github/scripts/merge-env-files.mjs \
            /tmp/lambda.env \
            /tmp/service.env \
            _novasafe-deployment/${{ inputs.overrides-env-path }}

      - name: Package Lambda zip
        id: package
        run: |
          set -euo pipefail
          node scripts/package-lambda.mjs \
            --service ${{ inputs.service }} \
            --env-file /tmp/lambda.env \
            --output dist/lambda.zip
          echo "artifact-path=dist/lambda.zip" >> "$GITHUB_OUTPUT"

      - name: Upload Lambda artifact
        uses: actions/upload-artifact@v4
        with:
          name: lambda-${{ inputs.application-name }}-${{ github.run_id }}
          path: dist/lambda.zip
          retention-days: 7
