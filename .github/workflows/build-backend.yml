# Reusable workflow — build and package a NovaSafe backend for AWS Lambda.
#
# Downloads the service `.env` from a private S3 config bucket, merges Lambda overrides,
# and bundles it into the deployment zip. No per-variable GitHub secrets needed.

name: Build Backend (AWS)

on:
  workflow_call:
    inputs:
      service:
        description: Backend service directory (core | admin-app)
        required: true
        type: string
      application-name:
        description: Application label (e.g. novasafe-mobile-api)
        required: true
        type: string
      node-version:
        description: Node.js version for the build
        required: false
        type: string
        default: '22'
      s3-env-key:
        description: S3 object key for the service .env (e.g. mobile-api/.env)
        required: true
        type: string
      overrides-env-path:
        description: Path in novasafe-deployment repo to Lambda override env file
        required: true
        type: string
    outputs:
      artifact-path:
        description: Path to the Lambda zip artifact
        value: ${{ jobs.build.outputs.artifact-path }}

jobs:
  build:
    name: Package ${{ inputs.application-name }} for Lambda
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    outputs:
      artifact-path: ${{ steps.package.outputs.artifact-path }}
    env:
      AWS_ROLE_ARN: ${{ vars.AWS_ROLE_ARN }}
      AWS_REGION: ${{ vars.AWS_REGION }}
      BACKEND_CONFIG_BUCKET: ${{ vars.BACKEND_CONFIG_BUCKET }}
    steps:
      - name: Validate repository variables
        run: |
          set -euo pipefail
          for name in AWS_ROLE_ARN AWS_REGION BACKEND_CONFIG_BUCKET; do
            if [ -z "${!name:-}" ]; then
              echo "::error::Missing repository variable: $name"
              exit 1
            fi
          done

      - name: Checkout backend
        uses: actions/checkout@v4

      - name: Checkout deployment scripts
        uses: actions/checkout@v4
        with:
          repository: novasafe-org/novasafe-deployment
          ref: master
          path: _novasafe-deployment
          sparse-checkout: |
            .github/scripts/merge-env-files.mjs
            .github/scripts/fetch-s3-env.sh
            .github/actions/configure-aws
            infra-aws/config/env

      - name: Enable Corepack
        run: corepack enable

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node-version }}
          cache: pnpm

      - name: Verify pnpm workspace allows esbuild
        run: |
          set -euo pipefail
          if [ ! -f pnpm-workspace.yaml ]; then
            echo "::error::pnpm-workspace.yaml is required for pnpm v11 (allowBuilds)."
            exit 1
          fi
          if ! grep -q 'esbuild: true' pnpm-workspace.yaml; then
            echo "::error::pnpm-workspace.yaml must include: allowBuilds: esbuild: true"
            echo "::error::Pull latest master (PR #121) and re-run."
            exit 1
          fi

      - name: Install pnpm dependencies
        env:
          HUSKY: '0'
          CI: 'true'
        run: pnpm install --frozen-lockfile

      - name: Configure AWS credentials (OIDC)
        uses: ./_novasafe-deployment/.github/actions/configure-aws
        with:
          role-arn: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}
          role-session-name: novasafe-${{ inputs.application-name }}-build

      - name: Fetch .env from S3 and merge Lambda overrides
        run: |
          set -euo pipefail
          bash _novasafe-deployment/.github/scripts/fetch-s3-env.sh \
            "${BACKEND_CONFIG_BUCKET}" \
            "${{ inputs.s3-env-key }}" \
            /tmp/service.env
          node _novasafe-deployment/.github/scripts/merge-env-files.mjs \
            /tmp/lambda.env \
            /tmp/service.env \
            _novasafe-deployment/${{ inputs.overrides-env-path }}

      - name: Package Lambda zip
        id: package
        run: |
          set -euo pipefail
          node scripts/package-lambda.mjs \
            --service ${{ inputs.service }} \
            --env-file /tmp/lambda.env \
            --output dist/lambda.zip
          echo "artifact-path=dist/lambda.zip" >> "$GITHUB_OUTPUT"

      - name: Upload Lambda artifact
        uses: actions/upload-artifact@v4
        with:
          name: lambda-${{ inputs.application-name }}-${{ github.run_id }}
          path: dist/lambda.zip
          retention-days: 7
