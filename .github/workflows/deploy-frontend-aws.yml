# Reusable workflow — deploy frontend to AWS
#
# Builds a React/Vite app, authenticates via GitHub OIDC, syncs to S3,
# and invalidates CloudFront. No AWS access keys or GitHub Secrets required.
#
# Caller repositories must configure Repository Variables:
#   AWS_ROLE_ARN, AWS_REGION
#
# Consumed by: novasafe-landing-v2, novasafe-app-v2 (future)

name: Deploy Frontend (AWS)

on:
  workflow_call:
    inputs:
      application-name:
        description: Application repository name (e.g. novasafe-landing-v2)
        required: true
        type: string
      build-directory:
        description: Build output directory to upload
        required: false
        type: string
        default: dist
      node-version:
        description: Node.js version for build
        required: false
        type: string
        default: '22'
      package-manager:
        description: Package manager (npm or pnpm)
        required: false
        type: string
        default: npm
      preinstall-script:
        description: 'Optional script to run before install (e.g. vendor local file dependencies)'
        required: false
        type: string
        default: ''
      s3-bucket:
        description: Target S3 bucket (LandingStack output BucketName)
        required: true
        type: string
      cloudfront-distribution-id:
        description: CloudFront distribution ID (LandingStack output DistributionId)
        required: true
        type: string
    outputs:
      deployment-summary:
        description: Human-readable deployment summary
        value: ${{ jobs.deploy.outputs.deployment-summary }}
      invalidation-id:
        description: CloudFront invalidation ID
        value: ${{ jobs.deploy.outputs.invalidation-id }}

jobs:
  deploy:
    name: Deploy ${{ inputs.application-name }} → production
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    outputs:
      deployment-summary: ${{ steps.summary.outputs.deployment-summary }}
      invalidation-id: ${{ steps.invalidate.outputs.invalidation-id }}
    env:
      AWS_ROLE_ARN: ${{ vars.AWS_ROLE_ARN }}
      AWS_REGION: ${{ vars.AWS_REGION }}
    steps:
      - name: Validate repository variables
        run: |
          set -euo pipefail
          missing=()
          for name in AWS_ROLE_ARN AWS_REGION; do
            value="${!name:-}"
            if [ -z "$value" ]; then
              missing+=("$name")
            fi
          done
          if [ "${#missing[@]}" -gt 0 ]; then
            echo "::error::Missing Repository Variables in ${GITHUB_REPOSITORY}: ${missing[*]}"
            echo "::error::Configure under Settings → Secrets and variables → Actions → Variables."
            exit 1
          fi

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Enable Corepack (pnpm)
        if: inputs.package-manager == 'pnpm'
        run: corepack enable

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node-version }}
          cache: ${{ inputs.package-manager }}

      - name: Prepare local dependencies
        if: inputs.preinstall-script != ''
        run: node ${{ inputs.preinstall-script }}

      - name: Install dependencies
        run: |
          if [ "${{ inputs.package-manager }}" = "pnpm" ]; then
            pnpm install --frozen-lockfile
          else
            npm ci
          fi

      - name: Build application
        run: |
          if [ "${{ inputs.package-manager }}" = "pnpm" ]; then
            pnpm run build
          else
            npm run build
          fi

      - name: Configure AWS credentials (OIDC)
        uses: ./.github/actions/configure-aws
        with:
          role-arn: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}
          role-session-name: novasafe-${{ inputs.application-name }}

      - name: Sync build to S3
        uses: ./.github/actions/deploy-s3
        with:
          bucket-name: ${{ inputs.s3-bucket }}
          source-directory: ${{ inputs.build-directory }}
          delete-removed: 'true'

      - name: Invalidate CloudFront cache
        id: invalidate
        uses: ./.github/actions/invalidate-cloudfront
        with:
          distribution-id: ${{ inputs.cloudfront-distribution-id }}
          paths: /*

      - name: Deployment summary
        id: summary
        shell: bash
        run: |
          SUMMARY="Deployed ${GITHUB_REPOSITORY} (${{ inputs.application-name }}) to s3://${{ inputs.s3-bucket }} [production]. CloudFront invalidation: ${{ steps.invalidate.outputs.invalidation-id }}"
          echo "${SUMMARY}"
          echo "deployment-summary=${SUMMARY}" >> "$GITHUB_OUTPUT"

          {
            echo "## AWS frontend deployment complete"
            echo ""
            echo "| Field | Value |"
            echo "|-------|-------|"
            echo "| Application | \`${{ inputs.application-name }}\` |"
            echo "| S3 bucket | \`${{ inputs.s3-bucket }}\` |"
            echo "| Build directory | \`${{ inputs.build-directory }}\` |"
            echo "| CloudFront distribution | \`${{ inputs.cloudfront-distribution-id }}\` |"
            echo "| Invalidation ID | \`${{ steps.invalidate.outputs.invalidation-id }}\` |"
            echo "| AWS region | \`${{ vars.AWS_REGION }}\` |"
            echo ""
            echo "Authentication: GitHub OIDC via Repository Variables (no access keys)."
            echo ""
            echo "**Cache strategy:** \`/assets/*\` long TTL; \`index.html\` short TTL; full \`/*\` invalidation (optimize later)."
          } >> "$GITHUB_STEP_SUMMARY"
