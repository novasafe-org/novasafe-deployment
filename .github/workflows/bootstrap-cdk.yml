# One-time CDK bootstrap for an AWS account/region via GitHub OIDC.
#
# Provisions the CDKToolkit stack only — does NOT deploy application stacks.
#
# Current model: single production AWS account. GitHub Environments are not used.
#
# Required Repository Variables (Settings → Secrets and variables → Actions → Variables):
#   AWS_ROLE_ARN         — IAM role ARN to assume (bootstrap permissions)
#   AWS_REGION           — AWS region to bootstrap
#   CDK_DEFAULT_ACCOUNT  — Target AWS account ID
#   CDK_DEFAULT_REGION   — CDK default region (usually same as AWS_REGION)
#
# See infra-aws/docs/bootstrap.md

name: Bootstrap CDK

on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

concurrency:
  group: bootstrap-cdk
  cancel-in-progress: false

jobs:
  bootstrap:
    name: CDK Bootstrap (production)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: infra-aws/cdk

    env:
      CDK_ENV: production
      AWS_REGION: ${{ vars.AWS_REGION }}
      AWS_ROLE_ARN: ${{ vars.AWS_ROLE_ARN }}
      CDK_DEFAULT_ACCOUNT: ${{ vars.CDK_DEFAULT_ACCOUNT }}
      CDK_DEFAULT_REGION: ${{ vars.CDK_DEFAULT_REGION }}

    steps:
      - name: Validate repository variables
        working-directory: .
        run: |
          set -euo pipefail
          missing=()
          for name in AWS_ROLE_ARN AWS_REGION CDK_DEFAULT_ACCOUNT CDK_DEFAULT_REGION; do
            value="${!name:-}"
            if [ -z "$value" ]; then
              missing+=("$name")
            fi
          done
          if [ "${#missing[@]}" -gt 0 ]; then
            echo "::error::Missing Repository Variables: ${missing[*]}"
            echo "::error::Configure under Settings → Secrets and variables → Actions → Variables."
            echo "::error::OIDC only — do not use AWS access keys or repository secrets."
            exit 1
          fi

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: infra-aws/cdk/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install AWS CDK CLI globally
        run: npm install -g aws-cdk@2

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}
          role-session-name: novasafe-cdk-bootstrap

      - name: Verify AWS identity
        id: identity
        run: |
          set -euo pipefail
          aws sts get-caller-identity
          ACCOUNT=$(aws sts get-caller-identity --query Account --output text)
          echo "account=$ACCOUNT" >> "$GITHUB_OUTPUT"

      - name: Run CDK bootstrap
        id: bootstrap
        run: |
          set -euo pipefail
          echo "Bootstrapping aws://${CDK_DEFAULT_ACCOUNT}/${CDK_DEFAULT_REGION} (cdk env=${CDK_ENV})"
          cdk bootstrap "aws://${CDK_DEFAULT_ACCOUNT}/${CDK_DEFAULT_REGION}" \
            -c "env=${CDK_ENV}" \
            --require-approval never

      - name: Read bootstrap version
        id: version
        run: |
          set -euo pipefail
          VERSION=$(aws ssm get-parameter \
            --name /cdk-bootstrap/hnb659fds/version \
            --region "$CDK_DEFAULT_REGION" \
            --query Parameter.Value \
            --output text)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Bootstrap version: $VERSION"

      - name: Print success summary
        run: |
          {
            echo "# CDK bootstrap complete"
            echo ""
            echo "| Field | Value |"
            echo "|-------|-------|"
            echo "| CDK environment | \`production\` |"
            echo "| AWS Account | \`${CDK_DEFAULT_ACCOUNT}\` |"
            echo "| Region | \`${CDK_DEFAULT_REGION}\` |"
            echo "| Bootstrap version | \`${{ steps.version.outputs.version }}\` |"
            echo "| Workflow run | [${GITHUB_RUN_ID}](${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}) |"
            echo ""
            echo "The \`CDKToolkit\` stack is ready. You can now run **Deploy Infrastructure**."
            echo ""
            echo "> **Note:** Landing stacks use ACM certificates in \`us-east-1\`. If \`${CDK_DEFAULT_REGION}\` is not \`us-east-1\`, update \`CDK_DEFAULT_REGION\` and \`AWS_REGION\` to bootstrap \`us-east-1\` as a second run (or bootstrap manually once)."
          } >> "$GITHUB_STEP_SUMMARY"
