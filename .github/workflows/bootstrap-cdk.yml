# One-time CDK bootstrap for an AWS account/region via GitHub OIDC.
#
# Provisions the CDKToolkit stack only — does NOT deploy application stacks.
#
# Current model: single production AWS account. GitHub Environments are not used.
#
# Required Repository Variables (Settings → Secrets and variables → Actions → Variables):
#   AWS_ROLE_ARN         — IAM role ARN to assume (bootstrap permissions)
#   AWS_REGION           — AWS region to bootstrap
#   CDK_DEFAULT_ACCOUNT  — Target AWS account ID
#   CDK_DEFAULT_REGION   — CDK default region (usually same as AWS_REGION)
#
# See infra-aws/docs/bootstrap.md

name: Bootstrap CDK

on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

concurrency:
  group: bootstrap-cdk
  cancel-in-progress: false

jobs:
  bootstrap:
    name: CDK Bootstrap (production)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: infra-aws/cdk

    env:
      CDK_ENV: production
      AWS_REGION: ${{ vars.AWS_REGION }}
      AWS_ROLE_ARN: ${{ vars.AWS_ROLE_ARN }}
      CDK_DEFAULT_ACCOUNT: ${{ vars.CDK_DEFAULT_ACCOUNT }}
      CDK_DEFAULT_REGION: ${{ vars.CDK_DEFAULT_REGION }}

    steps:
      - name: Validate repository variables
        working-directory: .
        run: |
          set -euo pipefail
          missing=()
          for name in AWS_ROLE_ARN AWS_REGION CDK_DEFAULT_ACCOUNT CDK_DEFAULT_REGION; do
            value="${!name:-}"
            if [ -z "$value" ]; then
              missing+=("$name")
            fi
          done
          if [ "${#missing[@]}" -gt 0 ]; then
            echo "::error::Missing Repository Variables: ${missing[*]}"
            echo "::error::Configure under Settings → Secrets and variables → Actions → Variables."
            echo "::error::OIDC only — do not use AWS access keys or repository secrets."
            exit 1
          fi

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: infra-aws/cdk/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install AWS CDK CLI globally
        run: npm install -g aws-cdk@2

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}
          role-session-name: novasafe-cdk-bootstrap

      - name: Verify AWS identity
        id: identity
        run: |
          set -euo pipefail
          aws sts get-caller-identity
          ACCOUNT=$(aws sts get-caller-identity --query Account --output text)
          echo "account=$ACCOUNT" >> "$GITHUB_OUTPUT"

      - name: Run CDK bootstrap
        id: bootstrap
        run: |
          set -euo pipefail
          PRIMARY="$CDK_DEFAULT_REGION"
          ACCOUNT="$CDK_DEFAULT_ACCOUNT"

          bootstrap_region() {
            local region="$1"
            local label="$2"
            echo "Bootstrapping ${label}: aws://${ACCOUNT}/${region}"
            cdk bootstrap "aws://${ACCOUNT}/${region}" \
              -c "env=${CDK_ENV}" \
              --require-approval never
          }

          bootstrap_region "$PRIMARY" "primary region"

          # CloudFront custom-domain ACM certificates must live in us-east-1 (AWS requirement).
          if [ "$PRIMARY" != "us-east-1" ]; then
            bootstrap_region "us-east-1" "us-east-1 (CloudFront ACM)"
          fi

      - name: Read bootstrap versions
        id: version
        run: |
          set -euo pipefail
          PRIMARY="$CDK_DEFAULT_REGION"
          PRIMARY_VERSION=$(aws ssm get-parameter \
            --name /cdk-bootstrap/hnb659fds/version \
            --region "$PRIMARY" \
            --query Parameter.Value \
            --output text)
          echo "primary_version=$PRIMARY_VERSION" >> "$GITHUB_OUTPUT"
          echo "Primary bootstrap version (${PRIMARY}): $PRIMARY_VERSION"

          if [ "$PRIMARY" != "us-east-1" ]; then
            USE1_VERSION=$(aws ssm get-parameter \
              --name /cdk-bootstrap/hnb659fds/version \
              --region us-east-1 \
              --query Parameter.Value \
              --output text)
            echo "use1_version=$USE1_VERSION" >> "$GITHUB_OUTPUT"
            echo "us-east-1 bootstrap version: $USE1_VERSION"
          fi

      - name: Print success summary
        run: |
          {
            echo "# CDK bootstrap complete"
            echo ""
            echo "| Field | Value |"
            echo "|-------|-------|"
            echo "| CDK environment | \`production\` |"
            echo "| AWS Account | \`${CDK_DEFAULT_ACCOUNT}\` |"
            echo "| Primary region | \`${CDK_DEFAULT_REGION}\` |"
            echo "| Primary bootstrap version | \`${{ steps.version.outputs.primary_version }}\` |"
          } >> "$GITHUB_STEP_SUMMARY"
          if [ "${CDK_DEFAULT_REGION}" != "us-east-1" ]; then
            {
              echo "| us-east-1 bootstrap version | \`${{ steps.version.outputs.use1_version }}\` (CloudFront ACM) |"
            } >> "$GITHUB_STEP_SUMMARY"
          fi
          {
            echo "| Workflow run | [${GITHUB_RUN_ID}](${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}) |"
            echo ""
            echo "Both \`${CDK_DEFAULT_REGION}\` and \`us-east-1\` are ready when deploying **Landing**."
          } >> "$GITHUB_STEP_SUMMARY"
