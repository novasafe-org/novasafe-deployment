# Reusable workflow — build frontend (placeholder)
#
# Future responsibility: install dependencies, run tests, and produce a static
# build artifact for S3 deployment (novasafe-landing-v2, novasafe-app-v2).
#
# TODO: implement build steps, artifact upload, and caching.
# DO NOT authenticate to AWS in this workflow yet.

name: Build Frontend (AWS)

on:
  workflow_call:
    inputs:
      application:
        description: Application repository name (e.g. novasafe-landing-v2)
        required: true
        type: string
      environment:
        description: Target environment (development, staging, production)
        required: true
        type: string
      node-version:
        description: Node.js version for the build
        required: false
        type: string
        default: '22'
      working-directory:
        description: Path to the frontend project root
        required: false
        type: string
        default: '.'
      aws-role-arn:
        description: IAM role ARN from GitHubOidcStack (future OIDC authentication)
        required: false
        type: string
        default: ''
      aws-region:
        description: AWS region for optional authenticated steps (future)
        required: false
        type: string
        default: eu-west-1
    outputs:
      build-ready:
        description: Whether the placeholder build job completed
        value: ${{ jobs.build.outputs.build-ready }}

jobs:
  build:
    name: Build ${{ inputs.application }} (${{ inputs.environment }})
    runs-on: ubuntu-latest
    outputs:
      build-ready: ${{ steps.placeholder.outputs.build-ready }}
    steps:
      # TODO(OIDC): Authenticate to AWS when build steps require it (e.g. pulling private artifacts).
      # - name: Configure AWS credentials (OIDC)
      #   uses: aws-actions/configure-aws-credentials@v4
      #   with:
      #     role-to-assume: ${{ inputs.aws-role-arn }}
      #     aws-region: ${{ inputs.aws-region }}
      #     role-session-name: novasafe-${{ inputs.application }}-${{ inputs.environment }}
      - name: Placeholder — checkout and build not implemented
        id: placeholder
        run: |
          echo "::notice::TODO: checkout, install, test, and build frontend for ${{ inputs.application }}"
          echo "environment=${{ inputs.environment }}"
          echo "node-version=${{ inputs.node-version }}"
          echo "working-directory=${{ inputs.working-directory }}"
          echo "build-ready=true" >> "$GITHUB_OUTPUT"
