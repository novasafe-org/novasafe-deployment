# Reusable workflow — deploy frontend to AWS
#
# Builds a React/Vite app, authenticates via GitHub OIDC, syncs to S3,
# and invalidates CloudFront. No AWS access keys or GitHub Secrets required.
#
# Consumed by: novasafe-landing-v2, novasafe-app-v2 (future)

name: Deploy Frontend (AWS)

on:
  workflow_call:
    inputs:
      application-name:
        description: Application repository name (e.g. novasafe-landing-v2)
        required: true
        type: string
      environment:
        description: Target environment (development, staging, production)
        required: true
        type: string
      build-directory:
        description: Build output directory to upload
        required: false
        type: string
        default: dist
      node-version:
        description: Node.js version for build
        required: false
        type: string
        default: '22'
      aws-region:
        description: AWS region for S3 and CloudFront API calls
        required: false
        type: string
        default: eu-west-1
      s3-bucket:
        description: Target S3 bucket (LandingStack output BucketName)
        required: true
        type: string
      cloudfront-distribution-id:
        description: CloudFront distribution ID (LandingStack output DistributionId)
        required: true
        type: string
      aws-role-arn:
        description: IAM deploy role ARN from GitHubOidcStack (OIDC — not a secret)
        required: true
        type: string
    outputs:
      deployment-summary:
        description: Human-readable deployment summary
        value: ${{ jobs.deploy.outputs.deployment-summary }}
      invalidation-id:
        description: CloudFront invalidation ID
        value: ${{ jobs.deploy.outputs.invalidation-id }}

jobs:
  deploy:
    name: Deploy ${{ inputs.application-name }} → ${{ inputs.environment }}
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    outputs:
      deployment-summary: ${{ steps.summary.outputs.deployment-summary }}
      invalidation-id: ${{ steps.invalidate.outputs.invalidation-id }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build application
        run: npm run build

      - name: Configure AWS credentials (OIDC)
        uses: ./.github/actions/configure-aws
        with:
          role-arn: ${{ inputs.aws-role-arn }}
          aws-region: ${{ inputs.aws-region }}
          role-session-name: novasafe-${{ inputs.application-name }}-${{ inputs.environment }}

      - name: Sync build to S3
        uses: ./.github/actions/deploy-s3
        with:
          bucket-name: ${{ inputs.s3-bucket }}
          source-directory: ${{ inputs.build-directory }}
          delete-removed: 'true'

      - name: Invalidate CloudFront cache
        id: invalidate
        uses: ./.github/actions/invalidate-cloudfront
        with:
          distribution-id: ${{ inputs.cloudfront-distribution-id }}
          paths: /*

      - name: Deployment summary
        id: summary
        shell: bash
        run: |
          SUMMARY="Deployed ${GITHUB_REPOSITORY} (${{ inputs.application-name }}) to s3://${{ inputs.s3-bucket }} [${{ inputs.environment }}]. CloudFront invalidation: ${{ steps.invalidate.outputs.invalidation-id }}"
          echo "${SUMMARY}"
          echo "deployment-summary=${SUMMARY}" >> "$GITHUB_OUTPUT"

          {
            echo "## AWS frontend deployment complete"
            echo ""
            echo "| Field | Value |"
            echo "|-------|-------|"
            echo "| Application | \`${{ inputs.application-name }}\` |"
            echo "| Environment | \`${{ inputs.environment }}\` |"
            echo "| S3 bucket | \`${{ inputs.s3-bucket }}\` |"
            echo "| Build directory | \`${{ inputs.build-directory }}\` |"
            echo "| CloudFront distribution | \`${{ inputs.cloudfront-distribution-id }}\` |"
            echo "| Invalidation ID | \`${{ steps.invalidate.outputs.invalidation-id }}\` |"
            echo "| AWS region | \`${{ inputs.aws-region }}\` |"
            echo ""
            echo "Authentication: GitHub OIDC (no access keys)."
            echo ""
            echo "**Cache strategy:** \`/assets/*\` long TTL; \`index.html\` short TTL; full \`/*\` invalidation (optimize later)."
          } >> "$GITHUB_STEP_SUMMARY"
