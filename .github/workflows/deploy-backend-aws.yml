# Reusable workflow — deploy a NovaSafe backend Lambda package to AWS.
#
# Requires a prior build job that uploaded dist/lambda.zip as an artifact,
# or build-backend.yml in the same caller workflow.

name: Deploy Backend (AWS)

on:
  workflow_call:
    inputs:
      application-name:
        description: Application label (e.g. novasafe-mobile-api)
        required: true
        type: string
      lambda-function-name:
        description: Target Lambda function name (from CDK stack output)
        required: true
        type: string
      artifact-name:
        description: Uploaded artifact name from build-backend.yml
        required: true
        type: string
      publish:
        description: Publish a new Lambda version after deploy
        required: false
        type: boolean
        default: false
      health-probe-path:
        description: Optional path for post-deploy Lambda smoke test (e.g. /mobile/health)
        required: false
        type: string
        default: ''
    outputs:
      deployed:
        description: Whether deployment succeeded
        value: ${{ jobs.deploy.outputs.deployed }}

jobs:
  deploy:
    name: Deploy ${{ inputs.application-name }} → Lambda
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    outputs:
      deployed: ${{ steps.deploy-lambda.outputs.deployed }}
    env:
      AWS_ROLE_ARN: ${{ vars.AWS_ROLE_ARN }}
      AWS_REGION: ${{ vars.AWS_REGION }}
    steps:
      - name: Validate repository variables
        run: |
          set -euo pipefail
          for name in AWS_ROLE_ARN AWS_REGION; do
            if [ -z "${!name:-}" ]; then
              echo "::error::Missing repository variable: $name"
              exit 1
            fi
          done

      - name: Checkout deployment actions
        uses: actions/checkout@v4
        with:
          repository: novasafe-org/novasafe-deployment
          ref: master
          path: _novasafe-deployment
          sparse-checkout: |
            .github/actions/configure-aws
            .github/actions/deploy-lambda

      - name: Download Lambda artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ inputs.artifact-name }}
          path: dist

      - name: Configure AWS credentials (OIDC)
        uses: ./_novasafe-deployment/.github/actions/configure-aws
        with:
          role-arn: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}
          role-session-name: novasafe-${{ inputs.application-name }}

      - name: Deploy Lambda package
        id: deploy-lambda
        uses: ./_novasafe-deployment/.github/actions/deploy-lambda
        with:
          function-name: ${{ inputs.lambda-function-name }}
          artifact-path: dist/lambda.zip
          publish: ${{ inputs.publish }}
          health-probe-path: ${{ inputs.health-probe-path }}
