# Reusable release-please workflow for NovaSafe application repositories.
#
# Call from each repo:
#   uses: novasafe-org/novasafe-deployment/.github/workflows/release-please.yml@master
#   secrets: inherit

name: Release Please (reusable)

on:
  workflow_call:
    inputs:
      config-file:
        description: Path to release-please-config.json
        required: false
        type: string
        default: release-please-config.json
      manifest-file:
        description: Path to .release-please-manifest.json (optional)
        required: false
        type: string
        default: .release-please-manifest.json

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      releases_created: ${{ steps.release.outputs.releases_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
      version: ${{ steps.release.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Release Please
        id: release
        uses: google-github-actions/release-please-action@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          config-file: ${{ inputs.config-file }}
          manifest-file: ${{ inputs.manifest-file }}

      - name: Release summary
        if: steps.release.outputs.releases_created == 'true'
        run: |
          echo "Created release ${{ steps.release.outputs.tag_name }}"
          echo "Version: ${{ steps.release.outputs.version }}"
