# --- BACKUP ---



# HTTP → HTTPS redirect
server {
    listen 80;
    server_name novasafe.io www.novasafe.io app.novasafe.io *.novasafe.io;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# Landing page - novasafe.io (Public, SEO-indexed)
server {
    listen 443 ssl http2;
    server_name novasafe.io www.novasafe.io;

    ssl_certificate     /etc/letsencrypt/live/novasafe.io/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/novasafe.io/privkey.pem;

    # SSL configuration
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    location / {
        proxy_pass http://frontend:80;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Tenant "landing";
        proxy_cache_bypass $http_upgrade;
    }
}

# Individual/Family app - app.novasafe.io (Private, NO indexing)
server {
    listen 443 ssl http2;
    server_name app.novasafe.io;

    ssl_certificate     /etc/letsencrypt/live/novasafe.io/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/novasafe.io/privkey.pem;

    # SSL configuration
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header X-Robots-Tag "noindex, nofollow" always;

    location / {
        proxy_pass http://frontend:80;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Tenant "individual";
        proxy_cache_bypass $http_upgrade;
    }
}

# Team/Business domains - *.novasafe.io (Private, NO indexing)
