# Portainer - internal-docker.novasafe.io (IP-restricted; replace allow lines with your IPs/CIDRs)
server {
    listen 443 ssl http2;
    server_name internal-docker.novasafe.io;
    server_tokens off;

    # Restrict access: allow only these IPs (replace with your office/VPN IPs or CIDRs)
    include /etc/nginx/conf.d/snippets/internal-docker.allowed_ips.conf;

    ssl_certificate     /etc/nginx/cloudflare/origin.crt;
    ssl_certificate_key /etc/nginx/cloudflare/origin.key;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Robots-Tag "noindex, nofollow" always;

    location / {
        proxy_pass http://portainer:9000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
    }
}