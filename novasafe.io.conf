
# HTTP → HTTPS redirect
server {
    listen 80;
    server_name novasafe.io www.novasafe.io start.novasafe.io app.novasafe.io *.novasafe.io internal-docker.novasafe.io;

    location / {
        return 301 https://$host$request_uri;
    }
}

# Landing page - novasafe.io (Public, SEO-indexed)
# Serves marketing site only; no /api (landing does not call backend)
server {
    listen 443 ssl http2;
    server_name novasafe.io www.novasafe.io;
    server_tokens off;

    ssl_certificate     /etc/nginx/cloudflare/origin.crt;
    ssl_certificate_key /etc/nginx/cloudflare/origin.key;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "accelerometer=(), camera=(), geolocation=(), microphone=(), payment=(), usb=()" always;

    location / {
        proxy_pass http://landing:80;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Tenant "landing";
        proxy_cache_bypass $http_upgrade;
    }
}

# Auth / Onboarding - start.novasafe.io (Private, noindex)
# Login, signup, onboarding; API calls go to /api → backend
server {
    listen 443 ssl http2;
    server_name start.novasafe.io;
    server_tokens off;

    ssl_certificate     /etc/nginx/cloudflare/origin.crt;
    ssl_certificate_key /etc/nginx/cloudflare/origin.key;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "accelerometer=(), camera=(), geolocation=(), microphone=(), payment=(), usb=()" always;
    add_header X-Robots-Tag "noindex, nofollow" always;

    location /api/ {
        rewrite ^/api(.*)$ $1 break;
        proxy_pass http://backend:5001;
        proxy_http_version 1.1;
        proxy_connect_timeout 10s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        proxy_hide_header X-Powered-By;
        proxy_hide_header Server;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        proxy_pass http://auth:80;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Tenant "auth";
        proxy_cache_bypass $http_upgrade;
    }
}

