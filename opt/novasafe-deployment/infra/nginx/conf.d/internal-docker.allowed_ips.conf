# Portainer IP allowlist — managed in this repo, synced to VPS on deploy.
#
# Commit, push, then deploy nginx (or wait for deploy-on-change on infra/nginx/**).
# DNS: internal-docker.novasafe.io must be DNS only (grey cloud).
#
# Find your current IP when on VPN: curl -s https://ifconfig.me

# Corporate VPN egress (66.159.204.115 → /24 block)
# allow 66.159.204.0/24;
allow all;

# Tighter option if IT confirms a single fixed egress IP only:
# allow 66.159.204.115;

deny all;
