# start.novasafe.io — TanStack Start SSR Node service.
#
# The upstream container listens on :3101 (non-privileged port; the SSR
# server runs as the unprivileged `node` user inside the container).

upstream novasafe_auth_upstream {
    server auth:3101;
    keepalive 32;
}

server {
    listen 443 ssl http2;
    server_name start.novasafe.io;

    ssl_certificate     /etc/nginx/cloudflare/origin.crt;
    ssl_certificate_key /etc/nginx/cloudflare/origin.key;

    # Allow OAuth redirects and large signup payloads without hitting the
    # default 1m cap.
    client_max_body_size 4m;

    # Buffering off keeps SSR streamed responses fast (the framework
    # writes the shell early so users see paint before data resolves).
    proxy_buffering off;
    proxy_request_buffering off;

    # Long-running server functions occasionally take >30s when the
    # upstream is cold. 75s leaves room without masking real hangs.
    proxy_connect_timeout 5s;
    proxy_send_timeout    75s;
    proxy_read_timeout    75s;

    location / {
        proxy_pass http://novasafe_auth_upstream;

        proxy_http_version 1.1;
        proxy_set_header Connection        "";

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $host;
    }
}
