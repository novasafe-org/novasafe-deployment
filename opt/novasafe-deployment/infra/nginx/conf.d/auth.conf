# start.novasafe.io — TanStack Start SSR Node service.
#
# The upstream container listens on :3101 (non-privileged port; the SSR
# server runs as the unprivileged `node` user inside the container).
#
# Variable proxy_pass + Docker DNS lets nginx start before auth is deployed.

server {
    listen 443 ssl http2;
    server_name start.novasafe.io;

    ssl_certificate     /etc/nginx/cloudflare/origin.crt;
    ssl_certificate_key /etc/nginx/cloudflare/origin.key;

    set $auth_upstream auth;

    client_max_body_size 4m;

    proxy_buffering off;
    proxy_request_buffering off;

    proxy_connect_timeout 5s;
    proxy_send_timeout    75s;
    proxy_read_timeout    75s;

    location / {
        proxy_pass http://$auth_upstream:3101;

        proxy_http_version 1.1;
        proxy_set_header Connection        "";

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $host;
    }
}
