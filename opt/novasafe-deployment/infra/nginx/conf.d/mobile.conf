# mobile.novasafe.io — mobile landing page.
#
# Variable proxy_pass + Docker DNS lets nginx start before mobile-landing exists.

server {

    listen 443 ssl http2;
    server_name mobile.novasafe.io;

    ssl_certificate /etc/nginx/cloudflare/origin.crt;
    ssl_certificate_key /etc/nginx/cloudflare/origin.key;

    set $mobile_landing_upstream mobile-landing;

    location / {

        proxy_pass http://$mobile_landing_upstream:80;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

    }

}
