# Admin API — reverse proxy (Cloudflare origin → nginx → admin-api container)
upstream novasafe_admin_api {
    server novasafe-admin-api:3130;
    keepalive 8;
}

server {
    listen 443 ssl http2;
    server_name admin-api.novasafe.io;

    include /etc/nginx/conf.d/snippets/ssl-cloudflare.conf;

    client_max_body_size 25m;

    location / {
        proxy_pass http://novasafe_admin_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
    }
}
