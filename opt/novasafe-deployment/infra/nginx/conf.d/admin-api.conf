# Admin API: https://admin-api.novasafe.io
# Same pattern as mobile-api.conf — origin certs + Docker DNS variable upstream.

server {

    listen 443 ssl http2;
    server_name admin-api.novasafe.io;

    ssl_certificate /etc/nginx/cloudflare/origin.crt;
    ssl_certificate_key /etc/nginx/cloudflare/origin.key;

    server_tokens off;
    client_max_body_size 25m;

    resolver 127.0.0.11 valid=10s ipv6=off;

    location / {

        set $admin_api_upstream novasafe-admin-api;
        proxy_pass http://$admin_api_upstream:3130;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header Connection "";

        proxy_connect_timeout 10s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

}
