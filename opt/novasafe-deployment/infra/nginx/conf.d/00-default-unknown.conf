# Catch-all — unknown hostnames must NOT fall through to app/auth (which redirect to start.novasafe.io).
# Every public service needs its own vhost file with an explicit server_name.
#
# If https://internal-docker.novasafe.io hits this block, portainer.conf is missing
# or nginx was not reloaded after adding it.

server {
    listen 80 default_server;
    listen 443 ssl http2 default_server;
    server_name _;

    ssl_certificate     /etc/nginx/cloudflare/origin.crt;
    ssl_certificate_key /etc/nginx/cloudflare/origin.key;

    default_type text/plain;
    return 404 "unknown host\n";
}
