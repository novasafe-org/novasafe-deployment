# novasafe.io — static SPA served by an in-container nginx on :3100.
#
# This file is the cluster-edge config: it terminates TLS for the apex
# domain and reverse-proxies everything to the `landing` container.
# The container's own nginx (`novasafe-landing-v2/nginx.conf`) is what
# actually serves the static bundle from `/usr/share/nginx/html`.

upstream novasafe_landing_upstream {
    server landing:3100;
    keepalive 16;
}

server {
    listen 443 ssl http2;
    server_name novasafe.io www.novasafe.io;

    ssl_certificate     /etc/nginx/cloudflare/origin.crt;
    ssl_certificate_key /etc/nginx/cloudflare/origin.key;

    # --------------------------------------------------------------------
    # Shared proxy parameters.
    #
    # Pulled up to the `server {}` scope so every location below inherits
    # them — keeps the SEO blocks DRY without an `include` file. nginx
    # only re-resolves `proxy_set_header` inside a `location` if that
    # location declares its own headers, so this is safe.
    # --------------------------------------------------------------------
    proxy_http_version 1.1;
    proxy_set_header Connection        "";
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # --------------------------------------------------------------------
    # SEO discovery files — `/sitemap.xml` and `/robots.txt`.
    #
    # Why these live here and not in the per-app nginx:
    #   - The cluster edge is the single point Google ever talks to. We
    #     assert the SEO contract (real static files, definitive
    #     Content-Type, no SPA bleed) once, here, instead of relying on
    #     every per-app upstream to get it right.
    #   - The landing container already writes
    #     `public/sitemap.xml` and `public/robots.txt` at build time
    #     via `scripts/generate-seo.mjs` (using `VITE_LANDING_URL` /
    #     `PUBLIC_SITE_URL` as the origin), so the inner nginx's
    #     `try_files $uri $uri/ /index.html;` returns the real files —
    #     the `/index.html` SPA fallback never fires for these paths.
    #
    # The `=` modifier means exact match — only the literal paths
    # `/sitemap.xml` and `/robots.txt` route here, so the human-readable
    # `/sitemap` HTML page on the SPA is untouched.
    #
    # We use `proxy_hide_header` + `add_header` (instead of a `types {}`
    # override) because this server only reverse-proxies; it doesn't
    # serve files, so it has no MIME machinery of its own. We replace
    # whatever Content-Type the upstream chose with the canonical value
    # Google Search Console expects.
    # --------------------------------------------------------------------
    location = /sitemap.xml {
        proxy_pass http://novasafe_landing_upstream;

        proxy_hide_header Content-Type;
        add_header Content-Type  "application/xml; charset=utf-8" always;
        add_header Cache-Control "public, max-age=3600"           always;
        add_header X-Robots-Tag  "noindex"                        always;
    }

    location = /robots.txt {
        proxy_pass http://novasafe_landing_upstream;

        proxy_hide_header Content-Type;
        add_header Content-Type  "text/plain; charset=utf-8" always;
        add_header Cache-Control "public, max-age=3600"      always;
    }

    # --------------------------------------------------------------------
    # Default reverse-proxy for every other path (SPA / static assets).
    # --------------------------------------------------------------------
    location / {
        proxy_pass http://novasafe_landing_upstream;
    }
}
