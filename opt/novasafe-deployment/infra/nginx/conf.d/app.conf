# app.novasafe.io — TanStack Start SSR Node service.
#
# Same shape as auth.conf — see that file for proxy-buffering / forwarded-header
# rationale. Upstream listens on :3102.
#
# Variable proxy_pass + Docker DNS lets nginx start before app is deployed.

server {
    listen 443 ssl http2;
    server_name app.novasafe.io;

    ssl_certificate     /etc/nginx/cloudflare/origin.crt;
    ssl_certificate_key /etc/nginx/cloudflare/origin.key;

    set $app_upstream app;

    client_max_body_size 4m;

    proxy_buffering off;
    proxy_request_buffering off;

    proxy_connect_timeout 5s;
    proxy_send_timeout    75s;
    proxy_read_timeout    75s;

    location / {
        proxy_pass http://$app_upstream:3102;

        proxy_http_version 1.1;
        proxy_set_header Connection        "";

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $host;
    }
}
