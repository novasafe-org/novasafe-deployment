# Portainer — https://internal-docker.novasafe.io
#
# Stable admin access via nginx + TLS. Portainer stays on the Docker network only;
# no host port binding required.
#
# Setup (one time):
#   1. Cloudflare DNS: A record internal-docker → VPS IP (DNS only / grey cloud)
#   2. Origin cert must cover internal-docker.novasafe.io (wildcard *.novasafe.io works)
#   3. Edit conf.d/snippets/internal-docker.allowed_ips.conf → commit → deploy nginx
#
# If Cloudflare proxy (orange cloud) is ON for this subdomain, use Cloudflare WAF
# IP rules instead of nginx allow list — or set this record to DNS-only (grey cloud).

server {
    listen 80;
    server_name internal-docker.novasafe.io;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name internal-docker.novasafe.io;

    ssl_certificate     /etc/nginx/cloudflare/origin.crt;
    ssl_certificate_key /etc/nginx/cloudflare/origin.key;

    server_tokens off;

    include /etc/nginx/conf.d/snippets/internal-docker.allowed_ips.conf;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Robots-Tag "noindex, nofollow" always;

    set $portainer_upstream portainer;

    location / {
        proxy_pass http://$portainer_upstream:9000;
        proxy_http_version 1.1;

        proxy_redirect off;

        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;

        proxy_connect_timeout 30s;
        proxy_send_timeout 86400;
        proxy_read_timeout 86400;
        proxy_buffering off;
    }
}
