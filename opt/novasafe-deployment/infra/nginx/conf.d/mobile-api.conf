# Mobile API (core): https://mobile-api.novasafe.io
# Synced to /opt/novasafe/infra/nginx/conf.d/mobile-api.conf by CI.

server {

    listen 443 ssl http2;
    server_name mobile-api.novasafe.io;

    ssl_certificate /etc/nginx/cloudflare/origin.crt;
    ssl_certificate_key /etc/nginx/cloudflare/origin.key;

    server_tokens off;
    client_max_body_size 2m;

    # CORS — must include mobile app headers (Capacitor WebView preflight from http://localhost).
    add_header Access-Control-Allow-Origin  "*" always;
    add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
    add_header Access-Control-Allow-Headers "Origin, Content-Type, Accept, Authorization, X-Source, X-Tenant, X-Request-Id, X-Correlation-Id, X-Trace-Id, X-Client-Source, X-Client-Platform, X-Client-Version, X-Build-Version, X-Device-Id, X-Session-Id, X-Api-Version, X-Client-Region, X-Client-Id, X-Client-Signature, X-Client-Timestamp, X-Client-Nonce, X-Client-Attestation" always;

    if ($request_method = OPTIONS) {
        return 204;
    }

    # Docker embedded DNS
    resolver 127.0.0.11 valid=10s ipv6=off;

    location / {

        set $mobile_vault_upstream novasafe-mobile-vault;
        proxy_pass http://$mobile_vault_upstream:3124;
        proxy_http_version 1.1;

        # Core also sets CORS — hide upstream headers to avoid duplicate "*, *" (browser blocks).
        proxy_hide_header Access-Control-Allow-Origin;
        proxy_hide_header Access-Control-Allow-Methods;
        proxy_hide_header Access-Control-Allow-Headers;
        proxy_hide_header Access-Control-Allow-Credentials;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header Connection "";

        proxy_connect_timeout 10s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

}
