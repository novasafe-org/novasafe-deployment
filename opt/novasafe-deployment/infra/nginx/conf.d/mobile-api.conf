# Mobile API (core): https://mobile-api.novasafe.io
# Synced to /opt/novasafe/infra/nginx/conf.d/mobile-api.conf by CI.

server {

    listen 443 ssl http2;
    server_name mobile-api.novasafe.io;

    ssl_certificate /etc/nginx/cloudflare/origin.crt;
    ssl_certificate_key /etc/nginx/cloudflare/origin.key;

    server_tokens off;
    client_max_body_size 2m;

    # Docker embedded DNS — resolve container names at request time (avoids stale upstream 502).
    # Also declared in nginx.conf; repeated here for clarity in this vhost.
    resolver 127.0.0.11 valid=10s ipv6=off;

    location / {

        set $mobile_vault_upstream novasafe-mobile-vault;
        proxy_pass http://$mobile_vault_upstream:3124;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header Connection "";

        proxy_connect_timeout 10s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

}
