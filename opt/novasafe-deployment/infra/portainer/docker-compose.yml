version: "3.9"

services:

  portainer:

    image: portainer/portainer-ce

    container_name: portainer

    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - portainer_data:/data

    networks:
      - novasafe-network

    restart: unless-stopped

volumes:
  portainer_data:

networks:
  novasafe-network:
    external: true