version: "3.9"

# Portainer — Docker UI at https://internal-docker.novasafe.io (nginx vhost only).
# Independent of app/auth/landing; no host ports exposed.

services:

  portainer:

    image: portainer/portainer-ce:lts

    container_name: portainer

    command: -H unix:///var/run/docker.sock

    environment:
      # Required behind reverse proxy — prevents bad redirects / CSRF issues
      TRUSTED_ORIGINS: https://internal-docker.novasafe.io

    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - portainer_data:/data

    networks:
      - novasafe-network

    restart: unless-stopped

volumes:
  portainer_data:

networks:
  novasafe-network:
    external: true
