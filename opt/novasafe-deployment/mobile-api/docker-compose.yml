# Canonical compose for /opt/novasafe-deployment/mobile-api on the production server.
# Synced by novasafe-deployment deploy.sh / GitHub Actions (does not overwrite .env).
# Public HTTPS: https://mobile-api.novasafe.io (nginx → novasafe-mobile-vault:3124).
# Image is built from services/core (novasafe-core); service key kept for smooth migration.

version: "3.9"

services:
  mobile_vault:
    image: ghcr.io/novasafe-org/novasafe-mobile-vault:latest
    pull_policy: always
    container_name: novasafe-mobile-vault
    env_file:
      - .env
    environment:
      CORE_PORT: "3124"
      PORT: "3124"
      # Override server .env — production: file logs only, no stdout noise
      NODE_ENV: production
      LOG_ENABLE_CONSOLE: "false"
      LOG_ENABLE_FILE: "true"
      LOG_FILE_MODE: single
      LOG_DIR: /app/logs
      LOG_JSON_FORMAT: "true"
      LOG_ENABLE_COLORS: "false"
      LOG_PRETTY_PRINT: "false"
      LOG_ENABLE_REQUEST: "true"
      LOG_ENABLE_ERROR_STACK: "true"
    ports:
      - "127.0.0.1:8085:3124"
    volumes:
      - /opt/novasafe-deployment/mobile-api/logs:/app/logs
    networks:
      - novasafe-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3124/mobile/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped

networks:
  novasafe-network:
    external: true
