# NovaSafe Mobile Vault API — internal + optional localhost debug bind.
# Public HTTPS: https://mobile-api.novasafe.io (nginx reverse proxy).
# Deploy path on server: /opt/novasafe/mobile-api/

version: "3.9"

services:
  mobile_vault:
    image: ghcr.io/novasafe-org/novasafe-mobile-vault:latest
    pull_policy: always
    container_name: mobile-vault-backend
    env_file:
      - .env
    environment:
      MOBILE_VAULT_PORT: "3124"
    # Not exposed on 0.0.0.0 — nginx reaches this container on novasafe-network.
    # Optional localhost-only debug access (host port 8085 → container 3124):
    ports:
      - "127.0.0.1:8085:3124"
    networks:
      - novasafe-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3124/mobile/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped

networks:
  novasafe-network:
    external: true
