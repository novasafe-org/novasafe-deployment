# Team/Business company subdomains (e.g. abc.novasafe.io)
# Explicitly exclude platform/reserved subdomains so they never route as tenants.
server {

    listen 443 ssl http2;

    server_name ~^(?!(?:app|api|start|mobile|www|internal)$)(?<tenant>[^.]+)\.novasafe\.io$;

    ssl_certificate /etc/nginx/cloudflare/origin.crt;
    ssl_certificate_key /etc/nginx/cloudflare/origin.key;

    location /api/ {
        rewrite ^/api(.*)$ $1 break;
        proxy_pass http://backend:5001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Tenant "team";
        proxy_set_header X-Company $tenant;
    }

    location / {

        proxy_pass http://app:80;

        proxy_set_header Host $host;
        proxy_set_header X-Tenant $tenant;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

    }

}